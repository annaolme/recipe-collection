{% extends 'base.html' %}
{% block title %}Add Recipe{% endblock %}
{% block content %}
<h1>Add Recipe</h1>
<form method="POST" class="recipe-form">
    <input type="text" name="title" placeholder="Recipe name" required>
    <input type="text" name="category" placeholder="Category (e.g. Dessert, Main)">
    <input type="text" name="prep_time" placeholder="Prep time (e.g. 30 min)">
    <textarea name="ingredients" rows="6" placeholder="Ingredients (one per line)" required></textarea>
    <textarea name="instructions" rows="8" placeholder="Instructions" required></textarea>
    <button type="submit">Save Recipe</button>
</form>
{% endblock %}
